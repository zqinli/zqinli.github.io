<aside class="sidebar" aria-label="Profile">
  <img class="avatar" src="{{ site.data.profile.avatar | relative_url }}" alt="{{ site.data.profile.name }} profile photo placeholder">
  <h1>{{ site.data.profile.name }}</h1>
  <p class="role">{{ site.data.profile.role }}</p>
  <p>{{ site.data.profile.affiliation }}</p>
  <p>{{ site.data.profile.location }}</p>
  <ul class="profile-links">
    <li><a href="mailto:{{ site.data.profile.email }}">{{ site.data.profile.email }}</a></li>
    <li><a href="{{ site.data.profile.github }}">GitHub</a></li>
    {% if site.data.profile.scholar and site.data.profile.scholar != "" %}
    <li><a href="{{ site.data.profile.scholar }}">Google Scholar</a></li>
    {% endif %}
  </ul>
  <!-- Add a Google Scholar URL in _data/profile.yml to display it here. -->
</aside>
